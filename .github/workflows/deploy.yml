name: Deploy to Production

on:
  push:
    branches:
      - deploy

# Only one deployment at a time; never cancel an in-flight deploy
concurrency:
  group: production
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/golden-hour
  SERVICE_NAME: golden-hour

jobs:
  deploy:
    name: Deploy Golden Hour Bot
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Validate required secrets
        run: |
          : "${SERVER_HOST:?'Set SERVER_HOST in repository Secrets'}"
          : "${SERVER_USER:?'Set SERVER_USER in repository Secrets'}"
          : "${SSH_PRIVATE_KEY:?'Set SSH_PRIVATE_KEY in repository Secrets'}"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # The deploy key in authorized_keys MUST have ForceCommand set to
      # /opt/golden-hour/deploy/run-deploy.sh (see deploy/setup-server.sh).
      # This means the SSH session cannot run arbitrary code — it only
      # triggers the server-side deploy script.
      - name: Trigger server-side deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Non-standard SSH port — override via repository secret SSH_PORT
          port: ${{ secrets.SSH_PORT || 47822 }}
          timeout: 60s
          command_timeout: 10m
          # With ForceCommand in authorized_keys the server runs run-deploy.sh
          # regardless of what we pass here. We pass the expected SHA so the
          # server-side script can verify it and refuse mismatched deploys.
          script: |
            DEPLOY_SHA="${{ github.sha }}"
            export DEPLOY_SHA
            /opt/golden-hour/deploy/run-deploy.sh "$DEPLOY_SHA"

      - name: Report result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deploy status : $STATUS"
          echo "Branch        : ${{ github.ref_name }}"
          echo "Commit SHA    : ${{ github.sha }}"
          echo "Triggered by  : ${{ github.actor }}"
